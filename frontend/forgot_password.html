<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Support Portal | Forgot Password</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body data-page="forgot-password">
	<div class="page-wrap auth-single-wrap">
		<section class="auth-panel card-soft">
			<h2>Reset Password</h2>
			<p class="muted">Request a verification code, verify it, then set a new password.</p>

			<form id="forgotRequestForm" class="stack-form">
				<label for="forgotEmail">Email</label>
				<input id="forgotEmail" type="email" required>
				<button id="forgotRequestButton" type="submit">Send Verification Code</button>
			</form>

			<form id="forgotVerifyForm" class="stack-form">
				<label for="forgotCode">Verification Code</label>
				<input id="forgotCode" type="text" required>
				<button id="forgotVerifyButton" type="submit">Verify Code</button>
			</form>

			<form id="forgotResetForm" class="stack-form">
				<label for="newPassword">New Password</label>
				<input id="newPassword" type="password" minlength="6" required>

				<label for="confirmNewPassword">Confirm New Password</label>
				<input id="confirmNewPassword" type="password" minlength="6" required>

				<button id="forgotResetButton" type="submit">Reset Password</button>
			</form>

			<div id="forgotMessage" class="message-box" aria-live="polite"></div>
			<div class="auth-links">
				<a href="/login">Back to login</a>
				<a href="/register">Create account</a>
			</div>
		</section>
	</div>

	<script src="/script.js"></script>
</body>
</html>
