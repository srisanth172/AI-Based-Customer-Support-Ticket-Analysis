services:
  - type: web
    name: ai-customer-support-ticket-analysis
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    autoDeploy: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////var/data/support_system.db
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false
